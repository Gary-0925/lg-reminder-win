name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  

permissions:
  contents: write
  pull-requests: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -A Win32

    - name: Build
      run: cmake --build build --config Release

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: lg-reminder - Windows下载
        path: build/Release/lg-reminder.exe
        if-no-files-found: error

    - name: Create zip
      if: startsWith(github.ref, 'refs/tags/')
      run: powershell -Command "Compress-Archive -Path 'build/Release/*' -DestinationPath 'build/Release/lg-reminder.windows.zip' -Force"

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/Release/lg-reminder.windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
